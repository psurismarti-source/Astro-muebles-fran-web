  <!-- Texto "Interiorisme" -->
  <text x="82" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#0a0a0a" letter-spacing="0.3">Interiorisme</text>
